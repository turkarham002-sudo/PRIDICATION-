                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>

        // RAJPUT PREDICTION LOGIC - ORIGINAL PRESERVED
        const _a = {
            '30S': 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json',
            '1M': 'https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json'
        };

        function generateSDDPrediction(lastTwoResults, nextPeriod) {
            const r1 = parseInt(lastTwoResults[0].number);
            const r2 = parseInt(lastTwoResults[1].number);
            const periodSuffix = parseInt(nextPeriod.slice(-4));
            const gap = Math.abs(r1 - r2);
            const v1 = (gap % 2 === 0) ? (r1 >= 5 ? 'BIG' : 'SMALL') : (r1 >= 5 ? 'SMALL' : 'BIG');
            const lb = r1 >= 5 ? 'BIG' : 'SMALL';
            const pb = r2 >= 5 ? 'BIG' : 'SMALL';
            const v2 = (lb === pb) ? lb : (lb === 'BIG' ? 'SMALL' : 'BIG');
            const ts = periodSuffix + new Date().getMinutes();
            const v3 = (ts % 2 === 0) ? 'SMALL' : 'BIG';
            const wv = Math.sin(periodSuffix * (r1 + 1));
            const v4 = (wv >= 0) ? 'BIG' : 'SMALL';
            const trendStable = (r1 >= 5 && r2 >= 5) || (r1 < 5 && r2 < 5);
            const v5 = trendStable ? (r1 >= 5 ? 'BIG' : 'SMALL') : (gap > 5 ? 'BIG' : 'SMALL');
            let bigCount = 0, smallCount = 0;
            [v1, v2, v3, v4, v5].forEach(v => { if(v === 'BIG') bigCount++; else smallCount++; });
            let finalPred = (bigCount === smallCount) ? v4 : (bigCount > smallCount ? 'BIG' : 'SMALL');
            const isBig = (finalPred === 'BIG');
            let rawNum = Math.floor(Math.abs(wv) * 1000) % 10;
            let n1 = rawNum;
            if(isBig) { if(n1 < 5) n1 += 5; } else { if(n1 >= 5) n1 -= 5; }
            let n2 = (n1 + 5) % 10;
            return {
                result: finalPred,
                number1: n1,
                number2: n2,
                confidence: Math.floor(Math.random() * 15) + 85
            };
        }

        const App = () => {
            const [activeTab, setActiveTab] = useState('predict');
            const [gameMode, setGameMode] = useState('30S');
            const [predictionsMap, setPredictionsMap] = useState({ '30S': null, '1M': null });
            const [periodsMap, setPeriodsMap] = useState({ '30S': '...', '1M': '...' });
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [stats, setStats] = useState({ wins: 0, losses: 0, accuracy: 0, total: 0 });
            const [history, setHistory] = useState([]);
            const [predictionReveal, setPredictionReveal] = useState(false);
            const [timer, setTimer] = useState(30);
            const lastProcessedPeriodRef = useRef({ '30S': null, '1M': null });
            const checkedResultsRef = useRef(new Set());

            // Direct access - no login needed
            useEffect(() => {
                const titleEl = document.querySelector('.madara-main-title');
                if(titleEl) titleEl.classList.add('access-granted-effect');
                setTimeout(() => { if(titleEl) titleEl.classList.remove('access-granted-effect'); }, 1000);
                showToast("⚡ SHARINGAN AWAKENED ⚡", true);
            }, []);

            const getISTTime = () => {
                const now = new Date();
                const utc = now.getTime() + (now.getTimezoneOffset() * 60 * 1000);
                const istOffset = 330 * 60 * 1000;
                return new Date(utc + istOffset);
            };

            const calculateTimer = (mode) => {
                const istNow = getISTTime();
                const seconds = istNow.getSeconds();
                if (mode === '30S') {
                    return 29 - (seconds % 30);
                } else {
                    return 59 - seconds;
                }
            };

            useEffect(() => {
                setTimer(calculateTimer(gameMode));
                const interval = setInterval(() => {
                    setTimer(calculateTimer(gameMode));
                }, 1000);
                return () => clearInterval(interval);
            }, [gameMode]);

            // Fetch periods and auto-generate predictions
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const url = _a[gameMode] + '?t=' + Date.now();
                        const res = await fetch(url);
                        const json = await res.json();

                        if (json?.data?.list) {
                            const list = json.data.list;
                            const nextPeriod = (BigInt(list[0].issueNumber) + 1n).toString();

                            setPeriodsMap(prev => ({ ...prev, [gameMode]: nextPeriod }));

                            const currentPred = predictionsMap[gameMode];
                            if (currentPred && currentPred.period !== '...' && currentPred.status === 'WAIT') {
                                const resultEntry = list.find(item => item.issueNumber === currentPred.period);
                                if (resultEntry && !checkedResultsRef.current.has(currentPred.period)) {
                                    checkedResultsRef.current.add(currentPred.period);
                                    const resultNumber = parseInt(resultEntry.number);
                                    const isWin = (currentPred.result === 'BIG' && resultNumber >= 5) || (currentPred.result === 'SMALL' && resultNumber < 5);
                                    const isJackpot = currentPred.numbers.includes(resultNumber);
                                    let status = isJackpot ? 'JACKPOT' : (isWin ? 'WIN' : 'LOSS');

                                    setHistory(prev => {
                                        const updated = prev.map(h => 
                                            h.period === currentPred.period 
                                                ? { ...h, status: status, actualNumber: resultNumber }
                                                : h
                                        );
                                        return updated;
                                    });

                                    setStats(prevStats => {
                                        let newWins = prevStats.wins;
                                        let newLosses = prevStats.losses;
                                        if (isWin || isJackpot) newWins++;
                                        else newLosses++;
                                        const newTotal = newWins + newLosses;
                                        const newAccuracy = newTotal > 0 ? Math.round((newWins / newTotal) * 100) : 0;
                                        return { wins: newWins, losses: newLosses, total: newTotal, accuracy: newAccuracy };
                                    });

                                    if (isWin || isJackpot) {
                                        showToast(`🎉 ${status}! ${currentPred.period} → ${currentPred.result} ✅`, true);
                                    } else {
                                        showToast(`💀 DEFEAT! ${currentPred.period} → ${currentPred.result} ❌`, true);
                                    }

                                    setPredictionsMap(prev => ({ ...prev, [gameMode]: null }));
                                    setPredictionReveal(false);
                                }
                            }

                            const lastProcessed = lastProcessedPeriodRef.current[gameMode];
                            if (lastProcessed !== nextPeriod) {
                                lastProcessedPeriodRef.current[gameMode] = nextPeriod;
                                generatePrediction(nextPeriod, list);
                            }
                        }
                    } catch(e) { console.error(e); }
                };

                fetchData();
                const interval = setInterval(fetchData, 3000);
                return () => clearInterval(interval);
            }, [gameMode, predictionsMap]);

            const generatePrediction = (period, lastTwo) => {
                if (isAnalyzing) return;
                setIsAnalyzing(true);
                setPredictionReveal(false);

                setTimeout(() => {
                    const pred = generateSDDPrediction(lastTwo, period);
                    const newPred = {
                        result: pred.result,
                        numbers: [pred.number1, pred.number2],
                        confidence: pred.confidence,
                        period: period,
                        mode: gameMode,
                        timestamp: Date.now(),
                        status: 'WAIT'
                    };

                    setPredictionsMap(prev => ({ ...prev, [gameMode]: newPred }));
                    setPredictionReveal(true);
                    setIsAnalyzing(false);

                    setHistory(prev => {
                        const exists = prev.find(h => h.period === period);
                        if (!exists) {
                            return [newPred, ...prev].slice(0, 50);
                        }
                        return prev;
                    });
                }, 800);
            };

            const currentPrediction = predictionsMap[gameMode];
            const currentPeriod = periodsMap[gameMode];

            const PredictionDisplay = () => {
                if (isAnalyzing && !currentPrediction) {
                    return (
                        <div className="sharingan-container">
                            <div className="sharingan-base">
                                <div className="sharingan-ring"></div>
                                <div className="tomoe tomoe-1"></div>
                                <div className="tomoe tomoe-2"></div>
                                <div className="tomoe tomoe-3"></div>
                                <div className="sharingan-pupil"></div>
                                <div className="prediction-overlay">
                                    <div className="text-red-500 text-sm font-bold animate-pulse tracking-wider">ANALYZING...</div>
                                </div>
                            </div>
                        </div>
                    );
                }
                if (currentPrediction) {
                    return (
                        <div className="sharingan-container">
                            <div className="sharingan-base">
                                <div className="sharingan-ring"></div>
                                <div className="tomoe tomoe-1"></div>
                                <div className="tomoe tomoe-2"></div>
                                <div className="tomoe tomoe-3"></div>
                                <div className="sharingan-pupil"></div>
                                <div className="prediction-overlay">
                                    <div className={`prediction-result-text ${predictionReveal ? 'animate-[resultPulse_0.6s_ease-out]' : ''}`}>
                                        {currentPrediction.result}
                                    </div>
                                </div>
                            </div>
                            <div className="confidence-ring">
                                ⚡ {currentPrediction.confidence}% Confidence
                            </div>
                        </div>
                    );
                }
                return (
                    <div className="sharingan-container opacity-70">
                        <div className="sharingan-base">
                            <div className="sharingan-ring"></div>
                            <div className="tomoe tomoe-1"></div>
                            <div className="tomoe tomoe-2"></div>
                            <div className="tomoe tomoe-3"></div>
                            <div className="sharingan-pupil"></div>
                            <div className="prediction-overlay">
                                <div className="text-red-600/60 text-xs">AWAITING PERIOD</div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderContent = () => {
                if (activeTab === 'predict') {
                    return (
                        <div className="flex flex-col items-center py-4">
                            <div className="mode-switch w-full max-w-[260px] mb-6">
                                <div onClick={() => setGameMode('30S')} className={`mode-option ${gameMode === '30S' ? 'active' : ''}`}>30 SEC</div>
                                <div onClick={() => setGameMode('1M')} className={`mode-option ${gameMode === '1M' ? 'active' : ''}`}>1 MIN</div>
                            </div>
                            <div className="text-center mb-4">
                                <p className="text-gray-400 text-[10px] tracking-widest">CURRENT PERIOD</p>
                                <p className="font-mono text-lg font-bold text-red-500 bg-black/40 px-3 py-1 rounded-full inline-block">{currentPeriod}</p>
                            </div>
                            <div className="timer-display">
                                {String(Math.floor(timer/60)).padStart(2,'0')}:{String(timer%60).padStart(2,'0')}
                            </div>
                            <div className="mb-6">
                                <PredictionDisplay />
                            </div>
                            {currentPrediction && (
                                <div className="flex gap-4 mb-4">
                                    <div className="text-center">
                                        <p className="text-[10px] text-red-400 mb-1">OMNI NUM</p>
                                        <div className="number-ball n1">{currentPrediction.numbers[0]}</div>
                                    </div>
                                    <div className="text-center">
                                        <p className="text-[10px] text-red-400 mb-1">BACKUP</p>
                                        <div className="number-ball n2">{currentPrediction.numbers[1]}</div>
                                    </div>
                                </div>
                            )}
                            <TelegramJoinButton />
                            <div className="text-[10px] text-red-400/80 bg-black/40 rounded-full px-4 py-2 text-center max-w-[280px] mt-3">
                                🔮 Sharingan activated • SDD Algorithm • Auto-updates
                            </div>
                        </div>
                    );
                }
                if (activeTab === 'dashboard') {
                    return (
                        <div className="space-y-4">
                            <div className="grid grid-cols-2 gap-3">
                                <div className="stat-card-blood"><div className="text-gray-400 text-[10px] uppercase tracking-wider">Accuracy</div><div className="text-2xl md:text-3xl font-extrabold text-red-500">{stats.accuracy}%</div></div>
                                <div className="stat-card-blood"><div className="text-gray-400 text-[10px] uppercase tracking-wider">Predictions</div><div className="text-2xl md:text-3xl font-extrabold text-white">{stats.total}</div></div>
                                <div className="stat-card-blood"><div className="text-gray-400 text-[10px] uppercase tracking-wider">Wins</div><div className="text-2xl md:text-3xl font-extrabold text-red-400">{stats.wins}</div></div>
                                <div className="stat-card-blood"><div className="text-gray-400 text-[10px] uppercase tracking-wider">Losses</div><div className="text-2xl md:text-3xl font-extrabold text-red-800">{stats.losses}</div></div>
                            </div>
                            <div className="card-red-glow p-4 text-center">
                                <div className="text-gray-400 text-[9px] tracking-[0.2em]">ACTIVE MODE</div>
                                <div className="text-xl font-black blood-text">{gameMode === '30S' ? '⚡ 30 SECONDS (SHARINGAN)' : '🔥 1 MINUTE'}</div>
                                <div className="text-red-500 text-xs font-mono mt-1">Period: {currentPeriod}</div>
                            </div>
                            <TelegramJoinButton />
                            <div className="text-center text-[9px] text-red-800/70">SDD Algorithm • Multi-Factor Analysis</div>
                        </div>
                    );
                }
                if (activeTab === 'history') {
                    return (
                        <div>
                            <h3 className="blood-text text-xl font-black mb-3">📜 BATTLE LOG</h3>
                            {history.length === 0 ? <div className="card-red-glow p-8 text-center text-red-400/50">No predictions yet</div> :
                                history.map((h, idx) => (
                                    <div key={idx} className={`history-item-blood ${h.status === 'WIN' || h.status === 'JACKPOT' ? 'win' : (h.status === 'LOSS' ? 'loss' : '')}`}>
                                        <div><p className="font-mono text-[10px] text-red-300">{h.period}</p><p className="text-[9px] text-red-500/80">{h.mode === '30S' ? '⚡30S' : '🔥1M'}</p></div>
                                        <div><p className={`font-black text-xl ${h.result === 'BIG' ? 'text-red-500' : 'text-orange-400'}`}>{h.result}</p><p className="text-[9px] text-gray-400">{h.numbers?.join(',')}</p></div>
                                        <div className={`px-2 py-0.5 rounded-full text-[9px] font-bold ${h.status === 'JACKPOT' ? 'bg-purple-600 text-white' : (h.status === 'WIN' ? 'bg-red-900/40 text-red-400' : (h.status === 'LOSS' ? 'bg-red-950/60 text-red-300' : 'bg-gray-800 text-gray-400'))}`}>{h.status || 'WAIT'}</div>
                                    </div>
                                ))
                            }
                            <div className="mt-4"><TelegramJoinButton /></div>
                        </div>
                    );
                }
                if (activeTab === 'profile') {
                    return (
                        <div className="space-y-4">
                            <div className="card-red-glow p-5 text-center"><div className="w-16 h-16 rounded-full bg-gradient-to-br from-red-700 to-red-900 mx-auto mb-2 flex items-center justify-center shadow-[0_0_15px_red]"><span className="font-black text-2xl">舞</span></div><h3 className="blood-text text-lg font-black">MADARA UCHIHA</h3><p className="text-red-400 text-[10px]">Eternal Mangekyō Member</p></div>
                            <div className="card-red-glow p-4"><h4 className="font-black text-red-500 border-b border-red-800 pb-2 mb-2">⚔️ SHINOBI INFO</h4><div className="mb-2"><p className="text-gray-400 text-[10px]">Access</p><p className="font-mono text-xs text-red-300 break-all">SHARINGAN UNLOCKED</p></div><div><p className="text-gray-400 text-[10px]">Mode</p><p className="font-mono text-xs text-red-300">Full Prediction Access</p></div></div>
                            <TelegramJoinButton />
                        </div>
                    );
                }
                return null;
            };

            return (
                <div className="mobile-container">
                    <div className="flex justify-between items-center p-3 border-b border-red-800/60 bg-black/30 backdrop-blur-sm"><div><h1 className="text-xl font-black blood-text tracking-wider">MADARA<span className="text-red-600"> UCHIHA</span></h1><p className="text-[7px] text-red-500/70 tracking-[0.2em]">PREDICTION AI • SDD VERSE</p></div><div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div><span className="text-red-400 text-[9px] font-bold">SHARINGAN</span></div></div>
                    <div className="scroll-content">{renderContent()}</div>
                    <div className="bottom-nav-blood"><div className="flex justify-around max-w-md mx-auto">{['dashboard','predict','history','profile'].map(id => (<div key={id} onClick={() => setActiveTab(id)} className={`nav-item-blood ${activeTab === id ? 'active' : ''}`}><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={id === 'dashboard' ? 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' : id === 'predict' ? 'M13 10V3L4 14h7v7l9-11h-7z' : id === 'history' ? 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z' : 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z'} /></svg><span>{id === 'dashboard' ? 'DOJO' : id === 'predict' ? 'PREDICT' : id === 'history' ? 'HISTORY' : 'AKATSUKI'}</span></div>))}</div></div>
                    <div id="global-toast" className="toast-message"></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
