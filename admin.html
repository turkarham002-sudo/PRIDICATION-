<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN PANEL</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{
    background:#000;
    color:#fff;
    font-family:'Rajdhani',sans-serif;
    padding:15px;
}

/* HEADER */
.title{
    font-family:'Orbitron',sans-serif;
    font-size:28px;
    text-align:center;
    color:#ff1a1a;
    text-shadow:0 0 20px red;
    margin-bottom:20px;
}

/* CARD */
.card{
    background:#0d0d0d;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    box-shadow:0 0 20px rgba(255,0,0,0.2);
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    background:#111;
    color:#fff;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:red;
    color:#fff;
    font-weight:bold;
}

/* KEY LIST */
.key{
    display:flex;
    justify-content:space-between;
    background:#111;
    padding:10px;
    margin-top:8px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="title">ADMIN DASHBOARD</div>

<div class="card">
    <h3>Total Keys: <span id="total">0</span></h3>
</div>

<div class="card">
    <h3>Generate Key</h3>

    <input type="date" id="date">
    <input type="time" id="time">

    <button onclick="generateKey()">CREATE KEY</button>
</div>

<div class="card">
    <h3>All Keys</h3>
    <div id="list"></div>
</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
 apiKey: "AIzaSyCkFRDinI38YJw0FWs5FuSlPE4Mh8o7zBM",
 databaseURL: "https://tournament-z-default-rtdb.firebaseio.com"};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔑 GENERATE KEY
function generateKey(){

let date = document.getElementById("date").value;
let time = document.getElementById("time").value;

if(!date || !time) return alert("Select Date & Time");

let expiry = new Date(date+" "+time).getTime();

let key = Math.random().toString(36).substr(2,8).toUpperCase();

db.ref("keys/"+key).set({
    expiry: expiry
});

alert("KEY: "+key);

loadKeys();
}

// 📋 LOAD KEYS
async function loadKeys(){

let snap = await db.ref("keys").once("value");

let total = 0;
let html = "";

snap.forEach(c=>{
    total++;

    let d = new Date(c.val().expiry);

    html += `
    <div class="key">
        <div>
            ${c.key}<br>
            <small>${d.toLocaleString()}</small>
        </div>
        <button onclick="delKey('${c.key}')">DEL</button>
    </div>`;
});

document.getElementById("list").innerHTML = html;
document.getElementById("total").innerText = total;
}

// ❌ DELETE
function delKey(k){
db.ref("keys/"+k).remove();
loadKeys();
}

// 🔁 AUTO LOAD
loadKeys();

</script>

</body>
</html>
